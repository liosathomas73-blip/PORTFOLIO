
<!DOCTYPE html>
<html>
<head>
    <title>Simple Page</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        
        nav {
            background: #333;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        
        .container {
            display: flex;
            align-items: center;
            padding: 20px;
        }

        img {
            width: 300px;
            margin-right: 20px;
        }

        h1 span {
            color: pink; /* Lee color */
        }

        button {
            padding: 10px 15px;
            background: goldenrod;
            color: white;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    
    <nav>
        <div>Name</div>
        <div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    
    <div class="container">
        <img src="asian-girl-ai-art-3840x2160-16586.jpg" alt="image">

        <div>
            <h1>Hello, am  <span>Lee</span></h1>
            <p>God's favourite.</p>
            <button>Let's Connect</button>
        </div>
    </div>

</body>
</html>
